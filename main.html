<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SISTEMA NINHO CAIPIRA - PDV & MENSALISTAS</title>
  
  <!-- Importação de Bibliotecas -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

  <style>
    /* --- IDENTIDADE VISUAL ALVINEGRA (NINHO CAIPIRA) --- */
    :root {
      --cor-preto: #000000;
      --cor-cinza-escuro: #1a1a1a;
      --cor-cinza-medio: #333333;
      --cor-cinza-claro: #f4f4f4;
      --cor-branco: #ffffff;
      --sombra: 0 4px 12px rgba(0,0,0,0.15);
    }

    body { 
      background-color: var(--cor-cinza-claro); 
      font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
      padding-top: 215px; /* Espaço para o cabeçalho triplo fixo */
      margin-bottom: 150px; /* Espaço para o rodapé fixo */
      user-select: none;
      color: var(--cor-preto);
    }

    /* --- CABEÇALHO TRIPLO FIXO --- */
    .fixed-top-container {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1030;
      background: var(--cor-branco);
      box-shadow: var(--sombra);
    }

    .admin-header {
      background: var(--cor-preto);
      color: var(--cor-branco);
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--cor-cinza-medio);
    }

    /* Navegação de Modos */
    .nav-modos {
      display: flex;
      background: #eeeeee;
      padding: 5px;
      gap: 5px;
      border-bottom: 1px solid #ddd;
    }
    .btn-modo {
      flex: 1;
      border: none;
      padding: 12px;
      font-weight: 800;
      font-size: 0.75rem;
      text-transform: uppercase;
      background: #ddd;
      color: #666;
      border-radius: 4px;
      transition: 0.3s;
    }
    .btn-modo.active {
      background: var(--cor-preto);
      color: var(--cor-branco);
    }

    .search-box {
      padding: 10px 15px 5px;
      background: var(--cor-branco);
    }
    
    .search-input {
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 10px 15px 10px 40px;
      width: 100%;
      font-weight: 700;
      background: #fff;
    }

    .search-icon {
      position: absolute;
      left: 28px;
      top: 24px;
      color: #888;
    }

    /* Categorias */
    .category-scroll {
      display: flex;
      overflow-x: auto;
      padding: 10px 15px;
      gap: 8px;
      background: var(--cor-branco);
      scrollbar-width: none;
    }
    .category-scroll::-webkit-scrollbar { display: none; }

    .cat-pill {
      padding: 8px 18px;
      border-radius: 4px;
      background: var(--cor-cinza-claro);
      white-space: nowrap;
      font-size: 0.75rem;
      font-weight: 800;
      color: var(--cor-cinza-medio);
      border: 1px solid #ddd;
      text-transform: uppercase;
      cursor: pointer;
    }
    .cat-pill.active {
      background: var(--cor-preto);
      color: var(--cor-branco);
      border-color: var(--cor-preto);
    }

    /* --- ÁREAS DE CONTEÚDO --- */
    .view-section { display: none; }
    .view-section.active { display: block; }

    /* Grade de Produtos */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      padding: 15px;
    }
    @media (max-width: 500px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }

    .product-btn {
      background: var(--cor-branco);
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px 10px;
      text-align: center;
      position: relative;
      box-shadow: 0 3px 6px rgba(0,0,0,0.05);
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: 0.2s;
    }
    .product-btn:active { transform: scale(0.95); background: #f9f9f9; }
    .product-btn h3 { font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; color: var(--cor-preto); }
    .product-btn .price { font-weight: 900; font-size: 1.2rem; color: var(--cor-preto); }

    /* Badge de Quantidade */
    .qty-badge {
      position: absolute;
      top: -8px;
      right: -5px;
      background: var(--cor-preto);
      color: var(--cor-branco);
      font-weight: 900;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--cor-branco);
      font-size: 0.8rem;
      z-index: 5;
    }

    /* --- LISTA DE MENSALISTAS NO GERENCIAMENTO --- */
    .comanda-card {
      background: var(--cor-branco);
      border-left: 8px solid var(--cor-preto);
      padding: 18px;
      margin: 10px 15px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer;
    }
    .comanda-card:active { background: #f0f0f0; }
    .comanda-info h4 { margin: 0; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; }
    .comanda-info p { margin: 0; font-size: 0.8rem; color: #666; font-weight: 600; }

    /* --- RODAPÉ DE FECHAMENTO --- */
    .checkout-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--cor-branco);
      border-top: 4px solid var(--cor-preto);
      padding: 15px 20px 25px;
      z-index: 1040;
      box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 12px;
    }
    .total-label { font-size: 0.8rem; color: #666; font-weight: 800; text-transform: uppercase; }
    .total-value { font-size: 2.4rem; font-weight: 900; color: var(--cor-preto); line-height: 1; letter-spacing: -1px; }

    .btn-finish {
      flex: 1;
      background: var(--cor-preto);
      color: var(--cor-branco);
      border: none;
      border-radius: 8px;
      font-weight: 800;
      font-size: 1.2rem;
      text-transform: uppercase;
      padding: 16px;
    }
    .btn-trash {
      width: 65px;
      height: 65px;
      border: 2px solid #ddd;
      background: #fdfdfd;
      color: var(--cor-preto);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
    }

    /* Modais */
    .modal-content { border-radius: 0; border: 5px solid var(--cor-preto); }
    .modal-header { border-bottom: 2px solid #eee; }
    .pay-opt {
      border: 2px solid #eee; padding: 22px 10px; text-align: center;
      font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 5px;
      transition: 0.2s;
    }
    .pay-opt:active { background: var(--cor-preto); color: var(--cor-branco); }

    .list-mensalistas-opt {
      max-height: 400px;
      overflow-y: auto;
    }
    .mensalista-item-select {
      padding: 18px; border-bottom: 1px solid #eee; font-weight: 800;
      text-transform: uppercase; cursor: pointer; display: flex; justify-content: space-between;
    }
    .mensalista-item-select:active { background: #000; color: #fff; }

    /* Estilo do Extrato / Histórico */
    .table-extrato { font-size: 0.85rem; }
    .table-extrato thead th { 
      background: #000; 
      color: #fff; 
      text-transform: uppercase; 
      font-size: 0.75rem;
      position: sticky;
      top: 0;
    }
    .table-extrato tbody td { vertical-align: middle; }
  </style>
</head>
<body>

<!-- CABEÇALHO TRIPLO FIXO -->
<div class="fixed-top-container">
  <div class="admin-header">
    <span class="fw-bold"><i class="bi bi-egg-fill"></i> NINHO CAIPIRA</span>
    <div class="d-flex align-items-center gap-2">
      <span id="relogio" style="font-family: monospace; font-weight: 900; font-size: 1.1rem;">00:00</span>
    </div>
  </div>
  
  <div class="nav-modos">
    <button class="btn-modo active" id="btn-venda" onclick="mudarModo('venda')">Venda Rápida</button>
    <button class="btn-modo" id="btn-comandas" onclick="mudarModo('comandas')">Gerenciar Mensalistas</button>
  </div>

  <div id="wrapper-busca-categorias">
    <div class="search-box position-relative">
      <i class="bi bi-search search-icon"></i>
      <input type="text" id="filtro" class="search-input" placeholder="BUSCAR PRODUTO..." onkeyup="buscarGlobal()">
    </div>
    <div id="category-bar" class="category-scroll">
      <!-- Gerado via JS dinamicamente -->
    </div>
  </div>
</div>

<!-- SEÇÃO: VENDA RÁPIDA / PRODUTOS -->
<section id="section-venda" class="view-section active">
  <div id="lista-produtos" class="products-grid">
    <!-- Produtos renderizados aqui -->
  </div>
</section>

<!-- SEÇÃO: GERENCIAR MENSALISTAS -->
<section id="section-comandas" class="view-section">
  <div class="p-3">
    
    <!-- NOVO BOTÃO DE CADASTRO (Substituindo o formulário fixo) -->
    <button class="btn btn-dark w-100 mb-4 py-3 fw-bold shadow-sm text-uppercase" data-bs-toggle="modal" data-bs-target="#modalCadastroCliente">
      <i class="bi bi-person-plus-fill me-2"></i> Cadastrar Novo Mensalista
    </button>

    <h6 class="fw-bold text-uppercase px-2 mb-3" style="letter-spacing: 1px;">Clientes Ativos (Toque para ver histórico)</h6>
    <div id="lista-clientes-gerenciamento">
      <!-- Lista de mensalistas vindos da aba 'mensalistas' -->
    </div>
  </div>
</section>

<!-- RODAPÉ DE FECHAMENTO FIXO -->
<div class="checkout-bar">
  <div class="total-row">
    <div>
      <div class="total-label" id="label-contexto">VALOR TOTAL DO PEDIDO</div>
      <div class="total-value" id="total-venda">R$ 0,00</div>
    </div>
    <div id="contagem-itens" class="badge bg-dark px-3 py-2" style="font-size: 0.9rem;">0 ITENS</div>
  </div>
  
  <div class="d-flex gap-2">
    <button class="btn-trash" onclick="limparContexto()" title="Limpar Pedido">
      <i class="bi bi-trash3"></i>
    </button>
    <button id="btn-acao-principal" class="btn-finish" onclick="processarAcaoPrincipal()">
      Fechar Venda
    </button>
  </div>
</div>

<!-- MODAL: ESCOLHER FORMA DE PAGAMENTO -->
<div class="modal fade" id="modalPagamento" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body p-4 text-center">
        <h5 class="fw-bold mb-4 text-uppercase">Escolha o Pagamento</h5>
        <div class="row g-2">
          <div class="col-6"><div class="pay-opt" onclick="fecharVendaRapida('Dinheiro')">Dinheiro</div></div>
          <div class="col-6"><div class="pay-opt" onclick="fecharVendaRapida('Pix')">Pix</div></div>
          <div class="col-6"><div class="pay-opt" onclick="fecharVendaRapida('Débito')">Débito</div></div>
          <div class="col-6"><div class="pay-opt" onclick="fecharVendaRapida('Crédito')">Crédito</div></div>
          <div class="col-12">
            <div class="pay-opt bg-warning text-dark border-0 mt-2" onclick="abrirSelecaoMensalista()">
              <i class="bi bi-person-fill-add"></i> LANÇAR NA CONTA (MENSALISTA)
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: SELECIONAR QUAL MENSALISTA -->
<div class="modal fade" id="modalEscolherMensalista" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-light"><h6 class="modal-title fw-bold">SELECIONE O CLIENTE</h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body p-0">
        <div id="lista-selecao-final" class="list-mensalistas-opt">
          <!-- Lista de mensalistas para seleção -->
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-dark w-100 fw-bold" data-bs-dismiss="modal">CANCELAR</button></div>
    </div>
  </div>
</div>

<!-- MODAL: EXTRATO / HISTÓRICO DETALHADO DO SITE -->
<div class="modal fade" id="modalExtrato" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-black text-white rounded-0">
        <h6 class="modal-title fw-bold text-uppercase" id="extrato-titulo">Extrato Detalhado</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <div class="table-responsive">
          <table class="table table-striped table-extrato mb-0">
            <thead>
              <tr>
                <th>Data / Hora</th>
                <th>Produto</th>
                <th>Qtd</th>
                <th>Subtotal</th>
              </tr>
            </thead>
            <tbody id="corpo-extrato">
              <!-- Linhas do log_mensalistas via JS -->
            </tbody>
          </table>
        </div>
        <div class="p-4 bg-light text-end border-top d-flex justify-content-between align-items-center">
          <span class="fw-bold text-muted text-uppercase small">Dívida Total Acumulada:</span>
          <span class="h3 fw-black mb-0" id="extrato-total">R$ 0,00</span>
        </div>
      </div>
      <div class="modal-footer bg-white">
        <button class="btn btn-outline-dark fw-bold px-4" onclick="enviarZapExtrato()">ENVIAR POR WHATSAPP</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: FORMULÁRIO DE CADASTRO DE CLIENTE -->
<div class="modal fade" id="modalCadastroCliente" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-black text-white">
        <h6 class="modal-title fw-bold text-uppercase">Novo Mensalista</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <div class="mb-3">
          <label class="small fw-bold text-muted">NOME DO CLIENTE</label>
          <input type="text" id="reg-nome" class="form-control fw-bold border-2" placeholder="EX: JOÃO DA SILVA">
        </div>
        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="small fw-bold text-muted">TELEFONE</label>
            <input type="tel" id="reg-tel" class="form-control fw-bold border-2" placeholder="(00) 00000-0000">
          </div>
          <div class="col-6">
            <label class="small fw-bold text-muted">ENDEREÇO</label>
            <input type="text" id="reg-end" class="form-control fw-bold border-2" placeholder="RUA, NÚMERO">
          </div>
        </div>
        <button class="btn btn-dark w-100 fw-bold py-3 text-uppercase" onclick="cadastrarMensalistaNoScript()">Salvar Cliente na Planilha</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ========================================================
  // CONFIGURAÇÕES DE INTEGRAÇÃO (LINKS DAS 4 ABAS)
  // ========================================================
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw8vTBPhqnir4l8AUemB4cbcvnWXDIfiPQa8Db8RXpcjSd4QPmzYERZWzw-i6nEpZFe/exec';
  
  // Lista de Preços
  const URL_PRECOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQdhEU_7Gcle7PCUi0RYGTffJ9Lu07YC71BMSqnoZChIWrZODHYenLZJvhnP-SxJ5mVNQBSrNFEhcMT/pub?gid=1050685172&single=true&output=csv';
  
  // Vendas Avulsas (Apenas para fins de registro, o site lê log_mensalistas para extratos)
  const URL_VENDAS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQdhEU_7Gcle7PCUi0RYGTffJ9Lu07YC71BMSqnoZChIWrZODHYenLZJvhnP-SxJ5mVNQBSrNFEhcMT/pub?gid=727058755&single=true&output=csv';
  
  // Mensalistas (Cadastro de Nomes/Telefones)
  const URL_CLIENTES = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQdhEU_7Gcle7PCUi0RYGTffJ9Lu07YC71BMSqnoZChIWrZODHYenLZJvhnP-SxJ5mVNQBSrNFEhcMT/pub?gid=2010558825&single=true&output=csv';
  
  // Log Mensalistas (Onde ficam as compras "penduradas")
  const URL_LOG = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQdhEU_7Gcle7PCUi0RYGTffJ9Lu07YC71BMSqnoZChIWrZODHYenLZJvhnP-SxJ5mVNQBSrNFEhcMT/pub?gid=1937035360&single=true&output=csv';

  // VARIÁVEIS DE ESTADO
  let produtosDB = [];
  let mensalistasDB = [];
  let carrinho = [];
  let categoriaAtiva = "";
  let clienteExtratoAtivo = "";
  let totalExtratoAtivo = 0;
  let itensExtratoAtivo = [];

  // 1. CARREGAMENTO INICIAL DE DADOS
async function carregarDadosIniciais() {
  try {
    // 1. CARREGAR PRODUTOS (URL_PRECOS)
    console.log("Buscando produtos...");
    const resP = await fetch(URL_PRECOS + '&nocache=' + new Date().getTime());
    const csvP = await resP.text();
    
    const linhasP = csvP.split(/\r?\n/).filter(l => l.trim() !== "");
    produtosDB = linhasP.slice(1).map((linha, i) => {
      const col = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      return { 
        id: i, 
        cat: col[0]?.replace(/"/g, '').trim(), 
        nome: col[1]?.replace(/"/g, '').trim(), 
        preco: limparEConverterPreco(col[2]) 
      };
    }).filter(p => p.nome && p.cat);

    console.log("Produtos carregados:", produtosDB.length);

    // 2. CARREGAR MENSALISTAS (URL_CLIENTES)
    console.log("Buscando mensalistas...");
    const resC = await fetch(URL_CLIENTES + '&nocache=' + new Date().getTime());
    const csvC = await resC.text();
    
    const linhasC = csvC.split(/\r?\n/).filter(l => l.trim() !== "");
    mensalistasDB = linhasC.slice(1).map(linha => {
      const col = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      return { 
        nome: col[0]?.replace(/"/g, '').trim(), 
        tel: col[1]?.replace(/"/g, '').trim(), 
        end: col[2]?.replace(/"/g, '').trim() 
      };
    }).filter(m => m.nome);

    console.log("Mensalistas carregados:", mensalistasDB.length);

    // 3. RENDERIZAR TUDO
    renderizarCategorias();
    renderizarListaGerenciamento();
    
    // Forçar a primeira categoria a aparecer se houver produtos
    if (produtosDB.length > 0) {
      const primeiraCat = [...new Set(produtosDB.map(p => p.cat))][0];
      selecionarCat(primeiraCat);
    }

  } catch (e) { 
    console.error("Erro Geral:", e);
    alert("Erro ao carregar dados. Verifique a conexão e se as planilhas estão publicadas."); 
  }
}
function limparEConverterPreco(texto) {
    if(!texto) return 0;
    // Remove R$, espaços e troca vírgula por ponto para o JS entender como número
    let limpo = texto.toString().replace(/[^\d,.-]/g, '').replace(',', '.');
    return parseFloat(limpo) || 0;
  }

  // 2. LOGICA DA INTERFACE DE VENDA
  function mudarModo(modo) {
    document.querySelectorAll('.btn-modo, .view-section').forEach(el => el.classList.remove('active'));
    if(modo === 'venda') {
      document.getElementById('btn-venda').classList.add('active');
      document.getElementById('section-venda').classList.add('active');
      document.getElementById('wrapper-busca-categorias').style.display = 'block';
    } else {
      document.getElementById('btn-comandas').classList.add('active');
      document.getElementById('section-comandas').classList.add('active');
      document.getElementById('wrapper-busca-categorias').style.display = 'none';
      renderizarListaGerenciamento(); // Atualiza a lista sempre que entra
    }
  }

  function renderizarCategorias() {
    const cats = [...new Set(produtosDB.map(p => p.cat))];
    const container = document.getElementById('category-bar');
    container.innerHTML = cats.map(c => `
      <div class="cat-pill" id="cat-${c}" onclick="selecionarCat('${c}')">${c}</div>
    `).join('');
    if(cats.length > 0) selecionarCat(cats[0]);
  }

  function selecionarCat(cat) {
    categoriaAtiva = cat;
    document.getElementById('filtro').value = "";
    document.querySelectorAll('.cat-pill').forEach(el => el.classList.remove('active'));
    const pilar = document.getElementById(`cat-${cat}`);
    if(pilar) pilar.classList.add('active');
    
    filtrarProdutos(produtosDB.filter(p => p.cat === cat));
  }

  function filtrarProdutos(lista) {
    const grid = document.getElementById('lista-produtos');
    grid.innerHTML = lista.map(p => {
      const itemNoCart = carrinho.find(i => i.id === p.id);
      const qtd = itemNoCart ? itemNoCart.qtd : 0;
      return `
        <div class="product-btn" onclick="adicionarAoPedido(${p.id})">
          <div class="qty-badge" id="badge-${p.id}" style="${qtd > 0 ? 'display:flex' : ''}">${qtd}</div>
          <h3>${p.nome}</h3>
          <span class="price">R$ ${p.preco.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
        </div>
      `;
    }).join('');
    atualizarResumoCarrinho();
  }

  function adicionarAoPedido(id) {
    const p = produtosDB.find(x => x.id === id);
    const existente = carrinho.find(i => i.id === id);
    if(existente) {
      existente.qtd++;
    } else {
      carrinho.push({...p, qtd: 1});
    }

    // Atualiza badge visual imediatamente para performance
    const badge = document.getElementById(`badge-${id}`);
    if(badge) {
      const novaQtd = carrinho.find(i => i.id === id).qtd;
      badge.innerText = novaQtd;
      badge.style.display = 'flex';
    }
    atualizarResumoCarrinho();
  }

  function atualizarResumoCarrinho() {
    const total = carrinho.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
    const totalItens = carrinho.reduce((acc, i) => acc + i.qtd, 0);
    document.getElementById('total-venda').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
    document.getElementById('contagem-itens').innerText = `${totalItens} ITENS`;
  }

  `).join('');
}
async function abrirHistoricoDestaque(nome) {
  clienteExtratoAtivo = nome;
  // Limpa e padroniza o nome para comparação
  const nomeBusca = nome.trim().toUpperCase();
  
  document.getElementById('extrato-titulo').innerText = `EXTRATO: ${nomeBusca}`;
  document.getElementById('corpo-extrato').innerHTML = `<tr><td colspan="4" class="text-center p-4"><div class="spinner-border spinner-border-sm"></div> Buscando no Log...</td></tr>`;
  document.getElementById('extrato-total').innerText = "R$ 0,00";
  
  new bootstrap.Modal(document.getElementById('modalExtrato')).show();

  try {
    // Busca o log com cache buster para vir dados novos
    const resLog = await fetch(URL_LOG + '&nocache=' + new Date().getTime());
    const csvLog = await resLog.text();
    
    // Divide por linhas e remove linhas vazias
    const linhasLog = csvLog.split(/\r?\n/).filter(l => l.trim() !== "");
    
    let htmlTabela = "";
    totalExtratoAtivo = 0;
    itensExtratoAtivo = [];

    // Pula o cabeçalho (i=1)
    for (let i = 1; i < linhasLog.length; i++) {
      // Divide as colunas respeitando aspas
      const col = linhasLog[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      
      if (col.length < 5) continue; // Pula linhas mal formadas

      // Colunas: A:Hora, B:Cliente, C:Produto, D:Qtd, E:Valor Total
      const logCliente = col[1]?.replace(/"/g, '').trim().toUpperCase();
      
      // COMPARAÇÃO SEGURA
      if (logCliente === nomeBusca) {
        const logData = col[0]?.replace(/"/g, '').trim();
        const logProd = col[2]?.replace(/"/g, '').trim();
        const logQtd  = col[3]?.replace(/"/g, '').trim();
        const logVlr  = limparEConverterPreco(col[4]); // Usa a função de conversão que já temos

        totalExtratoAtivo += logVlr;
        itensExtratoAtivo.push({ data: logData, prod: logProd, qtd: logQtd, vlr: logVlr });

        htmlTabela += `
          <tr>
            <td><small>${logData}</small></td>
            <td class="fw-bold">${logProd}</td>
            <td class="text-center">${logQtd}</td>
            <td class="fw-bold text-end">R$ ${logVlr.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
          </tr>
        `;
      }
    }

    if (itensExtratoAtivo.length > 0) {
      document.getElementById('corpo-extrato').innerHTML = htmlTabela;
    } else {
      document.getElementById('corpo-extrato').innerHTML = `<tr><td colspan="4" class="text-center p-4 text-muted">Nenhuma compra encontrada para este nome no Log.</td></tr>`;
    }
    
    document.getElementById('extrato-total').innerText = `R$ ${totalExtratoAtivo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

    console.log(`Encontrados ${itensExtratoAtivo.length} itens para ${nomeBusca}`);

  } catch(e) {
    console.error("Erro no extrato:", e);
    document.getElementById('corpo-extrato').innerHTML = `<tr><td colspan="4" class="text-center text-danger p-4">Erro ao conectar com a planilha de Log.</td></tr>`;
  }
}
  // 4. FINALIZAÇÃO DE VENDA
  function processarAcaoPrincipal() {
    if(carrinho.length === 0) return alert("Adicione produtos ao carrinho primeiro!");
    new bootstrap.Modal(document.getElementById('modalPagamento')).show();
  }

  function abrirSelecaoMensalista() {
    bootstrap.Modal.getInstance(document.getElementById('modalPagamento')).hide();
    const container = document.getElementById('lista-selecao-final');
    
    if(mensalistasDB.length === 0) {
      container.innerHTML = `<div class="p-4 text-center">Nenhum mensalista cadastrado na planilha para selecionar.</div>`;
    } else {
      container.innerHTML = mensalistasDB.map(m => `
        <div class="mensalista-item-select" onclick="registrarVendaFinal('${m.nome}', 'Mensalista')">
          <span>${m.nome}</span>
          <i class="bi bi-chevron-right text-muted"></i>
        </div>
      `).join('');
    }
    new bootstrap.Modal(document.getElementById('modalEscolherMensalista')).show();
  }

  function fecharVendaRapida(metodo) {
    registrarVendaFinal("AVULSO", metodo);
  }

  async function registrarVendaFinal(cliente, metodo) {
    const totalVenda = carrinho.reduce((acc, i) => acc + (i.preco * i.qtd), 0);
    const btn = event.target;
    const originalText = btn.innerText;
    
    if(btn.tagName === "DIV") btn.innerText = "PROCESSANDO...";

    try {
      // Envia para o Script (que decide se vai para 'Vendas' ou 'log_mensalistas')
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ 
          cliente: cliente, 
          itens: carrinho, 
          total: totalVenda, 
          pagamento: metodo 
        })
      });

      // Gera recibo WhatsApp se for Avulso (opcional)
      if(confirm("PEDIDO REGISTRADO COM SUCESSO!\n\nDeseja enviar o recibo por WhatsApp?")) {
        gerarReciboZap(cliente, metodo, totalVenda);
      }

      location.reload(); // Recarrega para limpar tudo e atualizar dados
    } catch(e) {
      alert("Erro ao registrar venda. Verifique sua conexão.");
      if(btn.tagName === "DIV") btn.innerText = originalText;
    }
  }

  // 5. UTILITÁRIOS (WHATSAPP, RELOGIO, BUSCA)
  function gerarReciboZap(cliente, metodo, total) {
    let msg = `*NINHO CAIPIRA - RECIBO*%0A`;
    msg += `---------------------------%0A`;
    msg += `*CLIENTE:* ${cliente}%0A`;
    msg += `*PAGAMENTO:* ${metodo}%0A`;
    msg += `---------------------------%0A`;
    carrinho.forEach(i => {
      msg += `${i.qtd}x ${i.nome} - R$ ${(i.preco * i.qtd).toFixed(2)}%0A`;
    });
    msg += `---------------------------%0A`;
    msg += `*TOTAL: R$ ${total.toFixed(2)}*%0A`;
    msg += `Obrigado pela preferência! 🥚🥚`;
    
    window.open(`https://wa.me/?text=${msg}`, '_blank');
  }

  function enviarZapExtrato() {
    let msg = `*NINHO CAIPIRA - EXTRATO DE CONTA*%0A`;
    msg += `*CLIENTE:* ${clienteExtratoAtivo}%0A`;
    msg += `---------------------------%0A`;
    itensExtratoAtivo.forEach(i => {
      msg += `• ${i.data} | ${i.prod} (${i.qtd}x) - R$ ${i.vlr.toFixed(2)}%0A`;
    });
    msg += `---------------------------%0A`;
    msg += `*TOTAL PENDENTE: R$ ${totalExtratoAtivo.toFixed(2)}*%0A`;
    msg += `Para dúvidas, entre em contato.`;
    
    window.open(`https://wa.me/?text=${msg}`, '_blank');
  }

  function limparContexto() {
    if(confirm("Deseja realmente cancelar e limpar este pedido?")) {
      location.reload();
    }
  }

  function buscarGlobal() {
    const termo = document.getElementById('filtro').value.toLowerCase();
    if(termo === "") {
      selecionarCat(categoriaAtiva);
      return;
    }
    // Remove as abas ativas visualmente durante a busca global
    document.querySelectorAll('.cat-pill').forEach(el => el.classList.remove('active'));
    
    const resultados = produtosDB.filter(p => p.nome.toLowerCase().includes(termo));
    filtrarProdutos(resultados);
  }

  // Relógio em tempo real
  setInterval(() => {
    const agora = new Date();
    document.getElementById('relogio').innerText = agora.getHours().toString().padStart(2,'0') + ":" + agora.getMinutes().toString().padStart(2,'0');
  }, 1000);

  // Inicialização
  carregarDadosIniciais();
</script>
